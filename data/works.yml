# Aozora Reading Compass - 初期作品リスト
#
# このファイルは「今日の一冊」推薦のための作品メタデータです。
# 本文は含めません。アクセスは aozora_url 経由で青空文庫へ誘導します。
#
# フィールド:
#   id:           安定したスラッグ (kebab-case)
#   title:        作品名
#   author:       著者名
#   aozora_url:   青空文庫の作品ページURL (本文はここで読む)
#   states:       合う状態 (recovery / thinking / stimulus / quiet)
#   themes:       テーマタグ
#   length_min:   読了目安(分)
#   summary_ok:   AIによる短い紹介文の生成を許可するか (本文要約ではなく雰囲気紹介)
#   note:         一言メモ (任意)
#
# 注意: aozora_url は青空文庫サイトの構造変更で変わる可能性があります。
#       初期データはサンプルとして著名作家の代表的短編を中心に選定しています。
#       実運用前に各URLの到達性を必ず確認してください。

