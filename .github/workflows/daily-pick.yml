name: Daily Pick

# 「今日の一冊」を data/works.yml から擬似ランダムに選び、
# README の指定セクションを毎日更新するワークフロー(雛形)。
#
# まだコードは存在しないため、現状はワークフロー定義のみで、
# 実装(scripts/daily_pick.py 等)は今後追加予定。
#
# 動作させるには:
#   1. scripts/daily_pick.py を実装し、works.yml から1作品を選んで
#      README.md の <!-- daily-pick:start --> ... <!-- daily-pick:end -->
